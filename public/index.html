<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theater Player</title>
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --line: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 0;
    }
    main {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      gap: 28px;
    }
    section {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .line {
      border-top: 4px solid var(--line);
    }
    h1 {
      margin: 0;
      font-size: clamp(3rem, 7vw, 8rem);
      line-height: 1.1;
      font-weight: 800;
      word-break: break-word;
    }
    .middle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }
    .status {
      margin: 0;
      font-size: clamp(2rem, 4.5vw, 5rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .time {
      margin: 0;
      font-size: clamp(2rem, 5vw, 5.4rem);
      font-weight: 800;
      white-space: nowrap;
    }
    h2 {
      margin: 0 0 16px;
      font-size: clamp(1.8rem, 3.6vw, 4rem);
      font-weight: 800;
    }
    ol {
      margin: 0;
      padding-left: 0.8em;
      list-style-position: inside;
    }
    li {
      font-size: clamp(1.4rem, 2.7vw, 3.1rem);
      margin: 10px 0;
      line-height: 1.15;
      word-break: break-word;
    }
    .empty {
      font-size: clamp(1.3rem, 2.3vw, 2.6rem);
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1 id="title">Nothing playing</h1>
    </section>

    <div class="line"></div>

    <section>
      <div class="middle-row">
        <p class="status" id="status">STARTING</p>
        <p class="time" id="progress">--:--/--:--</p>
      </div>
    </section>

    <div class="line"></div>

    <section>
      <h2 id="next">Next: none</h2>
      <ol id="queue"></ol>
      <div class="empty" id="emptyQueue">Queue is empty</div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const titleEl = document.getElementById('title');
    const statusEl = document.getElementById('status');
    const progressEl = document.getElementById('progress');
    const nextEl = document.getElementById('next');
    const queueEl = document.getElementById('queue');
    const emptyQueueEl = document.getElementById('emptyQueue');

    const socket = io();
    socket.on('state', (state) => {
      titleEl.textContent = state.title || 'Nothing playing';
      statusEl.textContent = (state.status || '').toUpperCase();
      progressEl.textContent = state.progressLabel || '--:--/--:--';

      queueEl.innerHTML = '';
      const queue = Array.isArray(state.queue) ? state.queue : [];
      nextEl.textContent = `Next: ${queue[0] || 'none'}`;

      for (const item of queue.slice(1)) {
        const li = document.createElement('li');
        li.textContent = item;
        queueEl.appendChild(li);
      }
      emptyQueueEl.style.display = queue.length <= 1 ? 'block' : 'none';
    });
  </script>
</body>
</html>
